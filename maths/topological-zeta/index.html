              Introduction
            </blockquote>

            <figcaption class="darker  margin-x-10" style="font-style: italic;">
              This collection presents a unified pathway from elementary Pythagorean geometry to a conditional proof of the Riemann Hypothesis. Beginning with a trigonometric-free construction of the sine function via dyadic bisection and harmonic greedy selection, the sequence of papers develops Egyptian fraction decompositions, lifts them into Dirichlet series attached to modular tensor categories, establishes a functional equation of Riemann&ndash;zeta type via Poisson summation, and identifies the greedy selectors with Galois characters to form a new class of Greedy-Egyptian MTCs. The zeta function is then realised as the limit of Reshetikhin&ndash;Turaev braid invariants, where the critical line emerges as a toroidal symmetry axis and zeros become topological defects. Numerical computation of the non-vanishing floor confirms an exponential-vs-polynomial crossing by level k&nbsp;&asymp;&nbsp;50, and four analytic steps are identified to close the argument into a rigorous proof.
            </figcaption>
          </figure>
