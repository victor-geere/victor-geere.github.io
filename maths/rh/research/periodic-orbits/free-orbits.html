<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Orbits on Bruhat–Tits Trees</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #05050f; font-family: 'Segoe UI', Arial, sans-serif; color: #ddd; }
        #container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        #drawer {
            position: absolute; top: 15px; left: 15px; width: 340px;
            background: rgba(10, 10, 30, 0.92); border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 255, 200, 0.15);
            overflow: hidden; border: 1px solid #00ccaa; z-index: 100;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #drawer-header {
            padding: 14px 18px; background: linear-gradient(90deg, #00cc99, #009977);
            color: #000; font-weight: bold; font-size: 1.1em; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center;
        }
        #drawer-content { padding: 16px 18px; max-height: 420px; overflow-y: auto; }
        label { display: block; margin: 12px 0 5px; font-size: 0.95em; color: #aaffff; }
        select, input[type="range"], button {
            width: 100%; padding: 8px 10px; margin-bottom: 10px;
            background: #1a1a2e; border: 1px solid #00ffcc; border-radius: 6px; color: #ddd;
        }
        button { background: #00cc99; color: #000; font-weight: bold; cursor: pointer; }
        button:hover { background: #00ffcc; }
        .info {
            position: absolute; bottom: 20px; left: 20px;
            background: rgba(0,0,0,0.75); padding: 14px 18px; border-radius: 10px;
            font-size: 0.92em; line-height: 1.5; max-width: 380px;
        }
        .collapsed #drawer-content { max-height: 0; padding: 0; overflow: hidden; }
        .arrow { transition: transform 0.3s; }
        .collapsed .arrow { transform: rotate(-180deg); }
    </style>
</head>
<body>
    <div id="container"></div>

    <!-- Collapsible Parameters Drawer -->
    <div id="drawer">
        <div id="drawer-header">
            <span>Parameters & Controls</span>
            <span class="arrow">▼</span>
        </div>
        <div id="drawer-content">
            <label for="p">Prime p (Tree regularity = p+1)</label>
            <select id="p">
                <option value="3">p = 3 → 4-regular</option>
                <option value="5" selected>p = 5 → 6-regular (default)</option>
                <option value="7">p = 7 → 8-regular</option>
            </select>

            <label for="orbitLength">Orbit Length (n)</label>
            <select id="orbitLength">
                <option value="3">n = 3</option>
                <option value="4" selected>n = 4 (default)</option>
                <option value="5">n = 5</option>
            </select>

            <label for="speed">Animation Speed: <span id="speedVal">1.0</span>x</label>
            <input type="range" id="speed" min="0.2" max="3" step="0.1" value="1">

            <label for="numOrbits">Number of Free Orbits</label>
            <input type="range" id="numOrbits" min="1" max="4" step="1" value="2">

            <div style="display: flex; gap: 8px; margin-top: 15px;">
                <button onclick="togglePause()" style="flex: 1;">⏸ Pause / Play</button>
                <button onclick="resetOrbits()" style="flex: 1;">Reset Orbits</button>
            </div>
        </div>
    </div>

    <!-- Info Panel -->
    <div class="info">
        <strong>Free Orbits on Bruhat–Tits Tree</strong><br>
        Pink particles trace non-periodic geodesics.<br><br>
        <span id="mathjaxContainer"></span>
    </div>

    <script>
        let scene, camera, renderer, controls;
        let treeGroup, orbits = [];
        let isPaused = false;
        let time = 0;
        let speed = 1.0;
        let animationFrame;

        const pSelect = document.getElementById('p');
        const orbitLengthSelect = document.getElementById('orbitLength');
        const speedSlider = document.getElementById('speed');
        const numOrbitsSlider = document.getElementById('numOrbits');
        const speedVal = document.getElementById('speedVal');

        function initThree() {
            const container = document.getElementById('container');
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x05050f, 40, 150);

            camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 200);
            camera.position.set(0, 18, 38);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            container.appendChild(renderer.domElement);

            // FIXED: Use THREE.OrbitControls (this is how the r134 non-module version exposes it)
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.12;
            controls.minDistance = 10;
            controls.maxDistance = 90;

            scene.add(new THREE.AmbientLight(0x667788, 0.8));
            const dirLight = new THREE.DirectionalLight(0xaaffff, 1.0);
            dirLight.position.set(25, 40, 20);
            scene.add(dirLight);

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        function createBruhatTitsTree(p) {
            if (treeGroup) scene.remove(treeGroup);
            treeGroup = new THREE.Group();
            scene.add(treeGroup);

            const degree = parseInt(p) + 1;
            const maxDepth = 5;

            function buildTree(parentPos, depth) {
                if (depth > maxDepth) return;
                const branches = depth === 0 ? degree : degree - 1;

                for (let i = 0; i < branches; i++) {
                    const angle = (i / branches) * Math.PI * 2 + depth * 0.6;
                    const len = 4.2 * (1 - depth * 0.1);

                    const dx = Math.cos(angle) * len * 0.85;
                    const dz = Math.sin(angle) * len * 0.7;
                    const dy = -len * 0.6;

                    const childPos = parentPos.clone().add(new THREE.Vector3(dx, dy, dz));

                    const dir = childPos.clone().sub(parentPos);
                    const edge = new THREE.Mesh(
                        new THREE.CylinderGeometry(0.12, 0.1, dir.length(), 8),
                        new THREE.MeshPhongMaterial({ color: 0x558899 })
                    );
                    edge.position.copy(parentPos).add(dir.multiplyScalar(0.5));
                    edge.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), dir.normalize());
                    treeGroup.add(edge);

                    const node = new THREE.Mesh(
                        new THREE.SphereGeometry(0.45 * (1 - depth*0.12), 16, 16),
                        new THREE.MeshPhongMaterial({ color: 0x99ffcc, emissive: 0x002211 })
                    );
                    node.position.copy(childPos);
                    treeGroup.add(node);

                    buildTree(childPos, depth + 1);
                }
            }

            const root = new THREE.Mesh(
                new THREE.SphereGeometry(0.9, 24, 24),
                new THREE.MeshPhongMaterial({ color: 0x00ffcc, emissive: 0x003322 })
            );
            root.position.set(0, 6, 0);
            treeGroup.add(root);

            buildTree(root.position, 0);
        }

        function createFreeOrbit() {
            const particle = new THREE.Mesh(
                new THREE.SphereGeometry(0.28, 16, 16),
                new THREE.MeshPhongMaterial({ color: 0xff44bb, emissive: 0xff0088 })
            );
            scene.add(particle);

            const trailPoints = new Array(80).fill().map(() => new THREE.Vector3());
            const trail = new THREE.Line(
                new THREE.BufferGeometry().setFromPoints(trailPoints),
                new THREE.LineBasicMaterial({ color: 0xff88dd, transparent: true, opacity: 0.5 })
            );
            scene.add(trail);

            return {
                particle, trail, trailPoints,
                trailIndex: 0,
                phase: Math.random() * Math.PI * 2,
                speed: 0.7 + Math.random() * 0.6,
                radius: 9 + Math.random() * 11
            };
        }

        function updateFreeOrbit(orbit, t) {
            const phase = t * orbit.speed + orbit.phase;
            const r = orbit.radius + Math.sin(phase * 1.2) * 3;

            const x = Math.cos(phase * 0.7) * r;
            const z = Math.sin(phase * 0.65) * r * 0.8;
            const y = 6 + Math.sin(phase * 0.9) * 6;

            orbit.particle.position.set(x, y, z);

            orbit.trailPoints[orbit.trailIndex].copy(orbit.particle.position);
            orbit.trailIndex = (orbit.trailIndex + 1) % orbit.trailPoints.length;
            orbit.trail.geometry.setFromPoints(orbit.trailPoints);
        }

        function createOrbits(count) {
            orbits.forEach(o => { scene.remove(o.particle); scene.remove(o.trail); });
            orbits = [];
            for (let i = 0; i < count; i++) orbits.push(createFreeOrbit());
        }

        function animate() {
            animationFrame = requestAnimationFrame(animate);
            if (!isPaused) time += 0.016 * speed;

            if (controls) controls.update();

            if (treeGroup) treeGroup.rotation.y = Math.sin(time * 0.05) * 0.03;

            orbits.forEach(orbit => updateFreeOrbit(orbit, time));

            renderer.render(scene, camera);
        }

        function updateMathJax() {
            const el = document.getElementById('mathjaxContainer');
            el.innerHTML = `Free orbits on the Bruhat–Tits tree contribute to the continuous spectrum of the transfer operator \\(\\mathcal{L}_s\\).`;
            if (window.MathJax) {
                MathJax.typesetClear([el]);
                MathJax.typesetPromise([el]);
            }
        }

        function togglePause() { isPaused = !isPaused; }
        function resetOrbits() {
            time = 0;
            orbits.forEach(o => {
                o.phase = Math.random() * Math.PI * 2;
                o.trailIndex = 0;
                o.trailPoints.forEach(p => p.set(0,0,0));
            });
        }

        function rebuildScene() {
            createBruhatTitsTree(pSelect.value);
            createOrbits(parseInt(numOrbitsSlider.value));
            updateMathJax();
        }

        function setupDrawer() {
            const drawer = document.getElementById('drawer');
            const header = document.getElementById('drawer-header');
            header.addEventListener('click', () => drawer.classList.toggle('collapsed'));
        }

        function addListeners() {
            pSelect.addEventListener('change', rebuildScene);
            numOrbitsSlider.addEventListener('input', () => createOrbits(parseInt(numOrbitsSlider.value)));
            speedSlider.addEventListener('input', () => {
                speed = parseFloat(speedSlider.value);
                speedVal.textContent = speed.toFixed(1);
            });
            document.addEventListener('keydown', e => {
                if (e.key === ' ') { e.preventDefault(); togglePause(); }
                if (e.key.toLowerCase() === 'r') resetOrbits();
            });
        }

        function init() {
            initThree();
            setupDrawer();
            rebuildScene();
            addListeners();
            animate();

            setTimeout(() => {
                if (window.MathJax) MathJax.typeset();
            }, 500);
        }

        window.onload = init;
    </script>
</body>
</html>
