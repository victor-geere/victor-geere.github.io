<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Square Peg Animation</title>
    <style>
        * { margin: 0; padding: 0; }
        body { background: #ffffff; overflow: hidden; }
        canvas { display: block; }
    </style>
</head>
<body>
<script type="module">
    import * as THREE from './lib/three.module.js';
    import { OrbitControls } from './lib/OrbitControls.js';

    // Scene
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xffffff);

    // Camera
    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(6, 8, 10);
    camera.lookAt(0, 0, 0);

    // Renderer
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    // Controls
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;

    // Lighting
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(8, 15, 10);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.width = 2048;
    dirLight.shadow.mapSize.height = 2048;
    dirLight.shadow.camera.near = 0.5;
    dirLight.shadow.camera.far = 50;
    dirLight.shadow.camera.left = -15;
    dirLight.shadow.camera.right = 15;
    dirLight.shadow.camera.top = 15;
    dirLight.shadow.camera.bottom = -15;
    scene.add(dirLight);

    // Material - white with black edges
    const whiteMat = new THREE.MeshStandardMaterial({
        color: 0xffffff,
        roughness: 0.4,
        metalness: 0.1
    });

    const floorMat = new THREE.MeshStandardMaterial({
        color: 0xffffff,
        roughness: 0.5,
        metalness: 0.05
    });

    // --- Square peg ---
    const pegSize = 1.8;
    const pegHeight = 3.5;
    const pegGeometry = new THREE.BoxGeometry(pegSize, pegHeight, pegSize);
    const peg = new THREE.Mesh(pegGeometry, whiteMat);
    peg.castShadow = true;
    peg.receiveShadow = true;
    scene.add(peg);

    // --- Floor with round hole (two flat planes + side walls at outer edges only) ---
    const floorThickness = 0.8;
    const floorSize = 12;
    const holeRadius = (pegSize * Math.SQRT2) / 2;
    const holeSegments = 64;
    const hs = floorSize / 2;

    // Flat plane shape with circular hole
    function makeFloorShape() {
        const shape = new THREE.Shape();
        shape.moveTo(-hs, -hs);
        shape.lineTo(hs, -hs);
        shape.lineTo(hs, hs);
        shape.lineTo(-hs, hs);
        shape.lineTo(-hs, -hs);
        const hole = new THREE.Path();
        hole.absarc(0, 0, holeRadius, 0, Math.PI * 2, true);
        shape.holes.push(hole);
        return shape;
    }

    const shapeSettings = { curveSegments: holeSegments };

    // Top plane
    const topGeo = new THREE.ShapeGeometry(makeFloorShape(), shapeSettings);
    const topPlane = new THREE.Mesh(topGeo, floorMat);
    topPlane.rotation.x = -Math.PI / 2;
    topPlane.position.y = floorThickness / 2;
    topPlane.castShadow = true;
    topPlane.receiveShadow = true;
    scene.add(topPlane);

    // Bottom plane
    const bottomGeo = new THREE.ShapeGeometry(makeFloorShape(), shapeSettings);
    const bottomPlane = new THREE.Mesh(bottomGeo, floorMat.clone());
    bottomPlane.material.side = THREE.BackSide;
    bottomPlane.rotation.x = -Math.PI / 2;
    bottomPlane.position.y = -floorThickness / 2;
    bottomPlane.castShadow = true;
    bottomPlane.receiveShadow = true;
    scene.add(bottomPlane);

    // Side walls — four outer edges of the square
    const sideMat = floorMat.clone();
    // sideMat.side = THREE.DoubleSide;

    // Front wall (z = -hs)
    const frontWall = new THREE.Mesh(new THREE.PlaneGeometry(floorSize, floorThickness), sideMat);
    frontWall.position.set(0, 0, -hs);
    frontWall.rotation.y = Math.PI;
    frontWall.castShadow = true;
    frontWall.receiveShadow = true;
    scene.add(frontWall);

    // Back wall (z = +hs)
    const backWall = new THREE.Mesh(new THREE.PlaneGeometry(floorSize, floorThickness), sideMat);
    backWall.position.set(0, 0, hs);
    // backWall.rotation.y = Math.PI;
    backWall.castShadow = true;
    backWall.receiveShadow = true;
    scene.add(backWall);

    // Right wall (x = +hs)
    const rightWall = new THREE.Mesh(new THREE.PlaneGeometry(floorSize, floorThickness), sideMat);
    rightWall.position.set(hs, 0, 0);
    rightWall.rotation.y = Math.PI / 2;
    rightWall.castShadow = true;
    rightWall.receiveShadow = true;
    scene.add(rightWall);

    // Left wall (x = -hs)
    const leftWall = new THREE.Mesh(new THREE.PlaneGeometry(floorSize, floorThickness), sideMat);
    leftWall.position.set(-hs, 0, 0);
    leftWall.rotation.y = 1.5 * Math.PI;
    leftWall.castShadow = true;
    leftWall.receiveShadow = true;
    scene.add(leftWall);

    // Circle edges at top and bottom of hole (not connected)
    const circleEdgeMat = new THREE.LineBasicMaterial({ color: 0x000000 });

    const topCircleGeo = new THREE.BufferGeometry().setFromPoints(
        Array.from({ length: holeSegments + 1 }, (_, i) => {
            const angle = (i / holeSegments) * Math.PI * 2;
            return new THREE.Vector3(Math.cos(angle) * holeRadius, 0, Math.sin(angle) * holeRadius);
        })
    );
    const topCircle = new THREE.Line(topCircleGeo, circleEdgeMat);
    topCircle.position.y = floorThickness / 2;
    scene.add(topCircle);

    const bottomCircleGeo = new THREE.BufferGeometry().setFromPoints(
        Array.from({ length: holeSegments + 1 }, (_, i) => {
            const angle = (i / holeSegments) * Math.PI * 2;
            return new THREE.Vector3(Math.cos(angle) * holeRadius, 0, Math.sin(angle) * holeRadius);
        })
    );
    const bottomCircle = new THREE.Line(bottomCircleGeo, circleEdgeMat);
    bottomCircle.position.y = -floorThickness / 2;
    scene.add(bottomCircle);

    // Square edges at top and bottom
    function makeSquareEdge(y) {
        const pts = [
            new THREE.Vector3(-hs, y, -hs),
            new THREE.Vector3(hs, y, -hs),
            new THREE.Vector3(hs, y, hs),
            new THREE.Vector3(-hs, y, hs),
            new THREE.Vector3(-hs, y, -hs)
        ];
        const geo = new THREE.BufferGeometry().setFromPoints(pts);
        return new THREE.Line(geo, circleEdgeMat);
    }
    scene.add(makeSquareEdge(floorThickness / 2));
    scene.add(makeSquareEdge(-floorThickness / 2));

    // Optional: add thin edges to peg for visual clarity
    const edgesGeometry = new THREE.EdgesGeometry(pegGeometry);
    const edgesMat = new THREE.LineBasicMaterial({ color: 0x000000 });
    const pegEdges = new THREE.LineSegments(edgesGeometry, edgesMat);
    peg.add(pegEdges);

    // Ground plane below the floor (to catch the peg going through)
    const groundGeo = new THREE.PlaneGeometry(floorSize, floorSize);
    const groundMat = new THREE.MeshStandardMaterial({ color: 0xeeeeee, roughness: 0.9 });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -6;
    ground.receiveShadow = true;
    scene.add(ground);

    // --- Animation ---
    const startY = 4;
    const endY = 0 - pegHeight / 2 + floorThickness / 2; // Just below the floor surface
    // const hoverY = pegHeight / 2 + 2;
    // const alignY = pegHeight / 2 + 0.5;

    // Animation phases with start/end Y positions
    const phases = [
        { duration: 0.5, fromY: startY,  toY: startY },
        { duration: 1.5, fromY: startY,  toY: endY },
        { duration: 60, fromY: endY,    toY: endY },
        { duration: 1.5, fromY: endY,    toY: startY },
    ];
    const totalDuration = phases.reduce((s, p) => s + p.duration, 0);

    function easeInOutCubic(t) {
        return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
    }

    function lerp(a, b, t) {
        return a + (b - a) * t;
    }

    const clock = new THREE.Clock();
    let elapsed = 0;

    function animate() {
        requestAnimationFrame(animate);
        const dt = clock.getDelta();
        elapsed += dt;

        const loopTime = elapsed % totalDuration;

        let phaseStart = 0;
        let y = startY;

        for (const phase of phases) {
            if (loopTime < phaseStart + phase.duration) {
                const t = easeInOutCubic((loopTime - phaseStart) / phase.duration);
                y = lerp(phase.fromY, phase.toY, t);
                break;
            }
            phaseStart += phase.duration;
        }

        peg.position.y = y;

        controls.update();
        renderer.render(scene, camera);
    }

    // Handle resize
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
</script>
</body>
</html>
